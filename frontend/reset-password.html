<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password | Kanban Board</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="auth.css" />
  </head>
  <body>
    <main class="auth-shell">
      <form id="resetPasswordForm" class="auth-card">
        <h1>Reset Password</h1>
        <p>Set a new password for your account.</p>

        <label for="password">New Password</label>
        <input id="password" type="password" minlength="8" required />

        <label for="confirmPassword">Confirm New Password</label>
        <input id="confirmPassword" type="password" minlength="8" required />

        <p class="hint">Use at least 8 characters with uppercase, lowercase, and a number.</p>

        <button type="submit">Update Password</button>
        <p id="message" class="message"></p>
        <p class="switch-link"><a href="login.html">Back to login</a></p>
      </form>
    </main>

    <script src="password-reset.js"></script>
  </body>
</html>
