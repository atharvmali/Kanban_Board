<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password | Kanban Board</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="auth.css" />
  </head>
  <body>
    <main class="auth-shell">
      <form id="forgotPasswordForm" class="auth-card">
        <h1>Forgot Password</h1>
        <p>Enter your registered email and we will send a reset link.</p>

        <label for="email">Email</label>
        <input id="email" type="email" required />

        <button type="submit">Send Reset Link</button>
        <p id="message" class="message"></p>
        <p class="switch-link"><a href="login.html">Back to login</a></p>
      </form>
    </main>

    <script src="password-reset.js"></script>
  </body>
</html>
