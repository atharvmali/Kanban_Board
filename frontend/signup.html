<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signup | Kanban Board</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="auth.css" />
  </head>
  <body>
    <main class="auth-shell">
      <form id="signupForm" class="auth-card">
        <h1>Create Account</h1>
        <p>Sign up to create private boards and tasks.</p>

        <label for="name">Name</label>
        <input id="name" type="text" minlength="2" maxlength="60" required />

        <label for="email">Email</label>
        <input id="email" type="email" required />

        <label for="password">Password</label>
        <input id="password" type="password" minlength="6" required />

        <button type="submit">Create Account</button>
        <p id="message" class="message"></p>
        <p class="switch-link">Already have an account? <a href="login.html">Login</a></p>
      </form>
    </main>

    <script src="auth.js"></script>
  </body>
</html>
